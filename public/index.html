<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #212121;
            --bg-secondary: #2f2f2f;
            --bg-input: #303030;
            --bg-hover: #3a3a3a;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --text-muted: #8e8e8e;
            --accent: #0084ff;
            --border: #424242;
            --openai: #10a37f;
            --gemini: #4285f4;
            --grok: #1da1f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Model Selector */
        .model-selector {
            position: relative;
        }

        .model-selector-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .model-selector-btn:hover {
            background: var(--bg-secondary);
        }

        .model-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--openai);
        }

        .model-indicator.gemini { background: var(--gemini); }
        .model-indicator.grok { background: var(--grok); }

        .model-chevron {
            color: var(--text-muted);
            font-size: 10px;
            transition: transform 0.2s;
        }

        .model-selector.open .model-chevron {
            transform: rotate(180deg);
        }

        /* Dropdown */
        .model-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            min-width: 240px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .model-selector.open .model-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .model-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .model-option:hover {
            background: var(--bg-hover);
        }

        .model-option.selected {
            background: var(--bg-hover);
        }

        .model-option-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .model-option-info {
            flex: 1;
        }

        .model-option-name {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .model-option-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .model-option-check {
            color: var(--text-muted);
            opacity: 0;
        }

        .model-option.selected .model-option-check {
            opacity: 1;
            color: var(--text-primary);
        }

        .model-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .model-option.disabled:hover {
            background: transparent;
        }

        /* Header Right */
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            font-family: inherit;
            transition: background 0.2s;
        }

        .header-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .header-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 768px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message-content {
            max-width: 85%;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
        }

        .message.assistant .message-content {
            color: var(--text-primary);
        }

        .message.assistant .message-content strong {
            font-weight: 600;
        }

        .message-content img {
            max-width: 300px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: block;
        }

        .message.user .message-content img {
            max-width: 200px;
            margin-bottom: 0;
            margin-top: 8px;
        }

        /* Provider Badge */
        .provider-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .provider-badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        /* Message Actions */
        .message-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        /* Input Area */
        .input-wrapper {
            padding: 16px 0 32px;
        }

        .input-area {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 4px 4px 4px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-area:focus-within {
            border-color: #5a5a5a;
        }

        .attach-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: -8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .attach-btn:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .attach-btn svg {
            width: 20px;
            height: 20px;
        }

        .input-field {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            padding: 12px 0;
            resize: none;
            min-height: 24px;
            max-height: 150px;
        }

        .input-field:focus {
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .send-btn {
            background: var(--text-primary);
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Image Preview */
        .image-preview {
            display: none;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .image-preview.active {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .image-preview img {
            height: 60px;
            border-radius: 8px;
        }

        .remove-image {
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .remove-image:hover {
            background: #444;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Hidden */
        #imageInput {
            display: none;
        }

        /* Welcome State */
        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .welcome-content {
            text-align: center;
        }

        .welcome h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="model-selector" id="modelSelector">
            <button class="model-selector-btn" onclick="toggleModelDropdown()">
                <span class="model-indicator" id="modelIndicator"></span>
                <span id="selectedModelName">GPT-5 Nano</span>
                <span class="model-chevron">▼</span>
            </button>
            <div class="model-dropdown" id="modelDropdown">
                <div class="model-option selected" data-provider="openai" onclick="selectModel('openai', 'GPT-5 Nano')">
                    <span class="model-option-indicator" style="background: var(--openai)"></span>
                    <div class="model-option-info">
                        <div class="model-option-name">GPT-5 Nano</div>
                        <div class="model-option-desc">OpenAI • Fast & efficient</div>
                    </div>
                    <span class="model-option-check">✓</span>
                </div>
                <div class="model-option" data-provider="gemini" onclick="selectModel('gemini', 'Gemini 2.0 Flash')">
                    <span class="model-option-indicator" style="background: var(--gemini)"></span>
                    <div class="model-option-info">
                        <div class="model-option-name">Gemini 2.0 Flash</div>
                        <div class="model-option-desc">Google • Multimodal</div>
                    </div>
                    <span class="model-option-check">✓</span>
                </div>
                <div class="model-option" data-provider="grok" onclick="selectModel('grok', 'Grok Beta')">
                    <span class="model-option-indicator" style="background: var(--grok)"></span>
                    <div class="model-option-info">
                        <div class="model-option-name">Grok Beta</div>
                        <div class="model-option-desc">xAI • Real-time knowledge</div>
                    </div>
                    <span class="model-option-check">✓</span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <button class="header-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                Share
            </button>
            <button class="header-btn" onclick="clearChat()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                New
            </button>
        </div>
    </header>

    <main class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-content">
                    <h2>How can I help you today?</h2>
                    <p>Select an AI model above, then ask anything</p>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-area">
                <button class="attach-btn" onclick="document.getElementById('imageInput').click()" title="Attach image">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" src="" alt="Preview">
                    <button class="remove-image" onclick="removeImage()">×</button>
                </div>
                <textarea 
                    class="input-field"
                    id="messageInput" 
                    placeholder="Ask anything"
                    rows="1"
                ></textarea>
                <div class="input-actions">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
    </main>

    <footer class="footer">
        AI can make mistakes. Check important info.
    </footer>

    <script>
        // State
        let attachedImage = null;
        let isLoading = false;
        let conversationHistory = [];
        let selectedProvider = 'openai';

        // Provider colors
        const providerColors = {
            openai: 'var(--openai)',
            gemini: 'var(--gemini)',
            grok: 'var(--grok)'
        };

        // DOM Elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const welcome = document.getElementById('welcome');
        const modelSelector = document.getElementById('modelSelector');
        const modelIndicator = document.getElementById('modelIndicator');
        const selectedModelName = document.getElementById('selectedModelName');

        // Model Selector
        function toggleModelDropdown() {
            modelSelector.classList.toggle('open');
        }

        function selectModel(provider, name) {
            selectedProvider = provider;
            selectedModelName.textContent = name;
            modelIndicator.style.background = providerColors[provider];
            
            // Update selected state
            document.querySelectorAll('.model-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.dataset.provider === provider) {
                    opt.classList.add('selected');
                }
            });
            
            // Clear conversation when switching models
            conversationHistory = [];
            
            modelSelector.classList.remove('open');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!modelSelector.contains(e.target)) {
                modelSelector.classList.remove('open');
            }
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Handle Enter key
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedImage = e.target.result.split(',')[1];
                previewImg.src = e.target.result;
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            attachedImage = null;
            imagePreview.classList.remove('active');
            document.getElementById('imageInput').value = '';
        }

        function clearChat() {
            conversationHistory = [];
            messagesContainer.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-content">
                        <h2>How can I help you today?</h2>
                        <p>Select an AI model above, then ask anything</p>
                    </div>
                </div>
            `;
        }

        function addMessage(role, content, imageData = null, provider = null) {
            const welcomeEl = document.getElementById('welcome');
            if (welcomeEl) welcomeEl.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let contentHtml = '';
            if (role === 'user' && imageData) {
                contentHtml = `<img src="data:image/jpeg;base64,${imageData}" alt="Image">`;
            }
            contentHtml += formatContent(content);

            const providerBadge = role === 'assistant' && provider ? `
                <div class="provider-badge">
                    <span class="provider-badge-dot" style="background: ${providerColors[provider] || providerColors.openai}"></span>
                    ${provider.charAt(0).toUpperCase() + provider.slice(1)}
                </div>
            ` : '';

            const actionsHtml = role === 'assistant' ? `
                <div class="message-actions">
                    <button class="action-btn" onclick="copyText(this)" title="Copy">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                    <button class="action-btn" title="Good response">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5" />
                        </svg>
                    </button>
                    <button class="action-btn" title="Bad response">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5" />
                        </svg>
                    </button>
                </div>
            ` : '';

            messageDiv.innerHTML = `
                ${providerBadge}
                <div class="message-content" data-content="${escapeAttr(content)}">${contentHtml}</div>
                ${actionsHtml}
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatContent(text) {
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function escapeAttr(text) {
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function copyText(btn) {
            const content = btn.closest('.message').querySelector('.message-content').dataset.content;
            navigator.clipboard.writeText(content);
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="provider-badge">
                    <span class="provider-badge-dot" style="background: ${providerColors[selectedProvider]}"></span>
                    ${selectedProvider.charAt(0).toUpperCase() + selectedProvider.slice(1)}
                </div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message && !attachedImage) return;
            if (isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;

            addMessage('user', message || 'Analyze this image', attachedImage);

            const currentImage = attachedImage;
            const currentMessage = message || 'What do you see in this image?';
            const currentProvider = selectedProvider;

            messageInput.value = '';
            messageInput.style.height = 'auto';
            removeImage();

            addTypingIndicator();

            try {
                let response;

                if (currentImage) {
                    response = await fetch('/api/analyze-image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: currentImage,
                            prompt: currentMessage,
                            provider: currentProvider
                        })
                    });
                } else {
                    conversationHistory.push({ role: 'user', content: currentMessage });

                    response = await fetch('/api/message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            messages: conversationHistory,
                            provider: currentProvider
                        })
                    });
                }

                const data = await response.json();
                removeTypingIndicator();

                if (data.success && data.content) {
                    addMessage('assistant', data.content, null, data.provider || currentProvider);
                    if (!currentImage) {
                        conversationHistory.push({ role: 'assistant', content: data.content });
                    }
                } else {
                    throw new Error(data.message || data.error || 'Failed to get response');
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Sorry, something went wrong: ${error.message}`, null, currentProvider);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        messageInput.focus();
    </script>
</body>
</html>
