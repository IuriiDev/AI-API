<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - API Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2a2a3a;
            --success: #22c55e;
            --error: #ef4444;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            color: var(--accent);
        }

        .provider-select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .provider-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 24px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--accent);
        }

        .message.assistant .message-avatar {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
        }

        .message-content {
            max-width: 70%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
        }

        .message.user .message-content {
            background: var(--accent);
            border-color: var(--accent);
        }

        .message-content p {
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message-content img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .message-content pre {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 8px;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .image-preview {
            display: none;
            margin-bottom: 12px;
            position: relative;
        }

        .image-preview.active {
            display: block;
        }

        .image-preview img {
            max-height: 120px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .image-preview .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: var(--error);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 14px 16px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            min-height: 52px;
            max-height: 150px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-attach {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-attach:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-send {
            background: var(--accent);
            color: white;
        }

        .btn-send:hover {
            background: var(--accent-hover);
        }

        .btn-send:disabled {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        /* Hidden file input */
        #imageInput {
            display: none;
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .welcome h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .welcome p {
            margin-bottom: 24px;
        }

        .capabilities {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .capability {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            text-align: left;
            min-width: 180px;
        }

        .capability-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .capability h3 {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .capability p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0;
        }

        /* Status */
        .status {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding: 8px;
        }

        .status.error {
            color: var(--error);
        }

        .status.success {
            color: var(--success);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🤖 <span>AI</span> Chat</h1>
        <select class="provider-select" id="providerSelect">
            <option value="openai">OpenAI (GPT-5-nano)</option>
            <option value="gemini" disabled>Gemini (coming soon)</option>
            <option value="grok" disabled>Grok (coming soon)</option>
            <option value="deepseek" disabled>DeepSeek (coming soon)</option>
        </select>
    </header>

    <main class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome">
                <h2>Welcome to AI Chat</h2>
                <p>Start a conversation or attach an image for analysis</p>
                <div class="capabilities">
                    <div class="capability">
                        <div class="capability-icon">💬</div>
                        <h3>Chat</h3>
                        <p>Ask anything</p>
                    </div>
                    <div class="capability">
                        <div class="capability-icon">🖼️</div>
                        <h3>Vision</h3>
                        <p>Analyze images</p>
                    </div>
                    <div class="capability">
                        <div class="capability-icon">🔧</div>
                        <h3>Fix Master</h3>
                        <p>Get repair help</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="Preview">
                <button class="remove-image" onclick="removeImage()">×</button>
            </div>
            <div class="input-row">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type a message... (Shift+Enter for new line)"
                        rows="1"
                    ></textarea>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-attach" onclick="document.getElementById('imageInput').click()" title="Attach image">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </button>
                    <button class="btn btn-send" id="sendBtn" onclick="sendMessage()" title="Send message">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
            </div>
            <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
        </div>
        <div class="status" id="status"></div>
    </main>

    <script>
        // State
        let attachedImage = null;
        let isLoading = false;
        let conversationHistory = [];

        // DOM Elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const providerSelect = document.getElementById('providerSelect');
        const statusEl = document.getElementById('status');

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Handle Enter key
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Handle image selection
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedImage = e.target.result.split(',')[1]; // Get base64 without prefix
                previewImg.src = e.target.result;
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        // Remove attached image
        function removeImage() {
            attachedImage = null;
            imagePreview.classList.remove('active');
            document.getElementById('imageInput').value = '';
        }

        // Add message to chat
        function addMessage(role, content, imageData = null) {
            // Remove welcome message if exists
            const welcome = messagesContainer.querySelector('.welcome');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '🤖';
            
            let contentHtml = `<p>${escapeHtml(content)}</p>`;
            if (imageData) {
                contentHtml = `<img src="data:image/jpeg;base64,${imageData}" alt="Attached image">` + contentHtml;
            }

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${contentHtml}</div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Add typing indicator
        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Set status
        function setStatus(message, type = '') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message && !attachedImage) return;
            if (isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            setStatus('');

            // Add user message
            addMessage('user', message || 'Analyze this image', attachedImage);
            
            // Store for API
            const currentImage = attachedImage;
            const currentMessage = message || 'What do you see in this image?';

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            removeImage();

            // Show typing indicator
            addTypingIndicator();

            try {
                let response;
                const provider = providerSelect.value;

                if (currentImage) {
                    // Image analysis
                    response = await fetch('/api/analyze-image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: currentImage,
                            prompt: currentMessage,
                            provider
                        })
                    });
                } else {
                    // Chat
                    conversationHistory.push({
                        role: 'user',
                        content: currentMessage
                    });

                    response = await fetch('/api/message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: conversationHistory,
                            provider
                        })
                    });
                }

                const data = await response.json();

                removeTypingIndicator();

                if (data.success && data.content) {
                    addMessage('assistant', data.content);
                    
                    if (!currentImage) {
                        conversationHistory.push({
                            role: 'assistant',
                            content: data.content
                        });
                    }
                    
                    setStatus(`Response from ${data.provider || provider}`, 'success');
                } else {
                    throw new Error(data.message || data.error || 'Failed to get response');
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Error: ${error.message}`);
                setStatus(error.message, 'error');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
