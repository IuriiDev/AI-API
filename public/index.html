<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #212121;
            --bg-secondary: #2f2f2f;
            --bg-input: #303030;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --text-muted: #8e8e8e;
            --accent: #0084ff;
            --border: #424242;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid transparent;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .header h1 span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .chevron {
            color: var(--text-muted);
            font-size: 12px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            font-family: inherit;
        }

        .header-btn:hover {
            color: var(--text-primary);
        }

        .header-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 768px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message-content {
            max-width: 85%;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
        }

        .message.assistant .message-content {
            color: var(--text-primary);
        }

        .message.assistant .message-content strong {
            font-weight: 600;
        }

        .message-content img {
            max-width: 300px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: block;
        }

        .message.user .message-content img {
            max-width: 200px;
            margin-bottom: 0;
            margin-top: 8px;
        }

        /* Message Actions */
        .message-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        /* Input Area */
        .input-wrapper {
            padding: 16px 0 32px;
        }

        .input-area {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 4px 4px 4px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-area:focus-within {
            border-color: #5a5a5a;
        }

        .attach-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: -8px;
        }

        .attach-btn:hover {
            color: var(--text-secondary);
        }

        .attach-btn svg {
            width: 20px;
            height: 20px;
        }

        .input-field {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            padding: 12px 0;
            resize: none;
            min-height: 24px;
            max-height: 150px;
        }

        .input-field:focus {
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .mic-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .mic-btn:hover {
            color: var(--text-secondary);
        }

        .mic-btn svg {
            width: 20px;
            height: 20px;
        }

        .send-btn {
            background: var(--text-primary);
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Image Preview */
        .image-preview {
            display: none;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .image-preview.active {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .image-preview img {
            height: 60px;
            border-radius: 8px;
        }

        .remove-image {
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .remove-image:hover {
            background: #444;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Hidden */
        #imageInput {
            display: none;
        }

        /* Welcome State */
        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .welcome-content {
            text-align: center;
        }

        .welcome h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1>AI Chat <span>5.1</span></h1>
            <span class="chevron">▾</span>
        </div>
        <div class="header-right">
            <button class="header-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                Share
            </button>
            <button class="header-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
                Add people
            </button>
            <button class="header-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" />
                </svg>
            </button>
        </div>
    </header>

    <main class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-content">
                    <h2>How can I help you today?</h2>
                    <p>Ask anything or attach an image for analysis</p>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-area">
                <button class="attach-btn" onclick="document.getElementById('imageInput').click()" title="Attach image">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" src="" alt="Preview">
                    <button class="remove-image" onclick="removeImage()">×</button>
                </div>
                <textarea 
                    class="input-field"
                    id="messageInput" 
                    placeholder="Ask anything"
                    rows="1"
                ></textarea>
                <div class="input-actions">
                    <button class="mic-btn" title="Voice input">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
    </main>

    <footer class="footer">
        AI can make mistakes. Check important info.
    </footer>

    <script>
        let attachedImage = null;
        let isLoading = false;
        let conversationHistory = [];

        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const welcome = document.getElementById('welcome');

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Handle Enter key
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedImage = e.target.result.split(',')[1];
                previewImg.src = e.target.result;
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            attachedImage = null;
            imagePreview.classList.remove('active');
            document.getElementById('imageInput').value = '';
        }

        function addMessage(role, content, imageData = null) {
            if (welcome) welcome.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let contentHtml = '';
            if (role === 'user' && imageData) {
                contentHtml = `<img src="data:image/jpeg;base64,${imageData}" alt="Image">`;
            }
            contentHtml += formatContent(content);

            const actionsHtml = role === 'assistant' ? `
                <div class="message-actions">
                    <button class="action-btn" onclick="copyText(this)" title="Copy">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                    <button class="action-btn" title="Good response">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5" />
                        </svg>
                    </button>
                    <button class="action-btn" title="Bad response">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5" />
                        </svg>
                    </button>
                    <button class="action-btn" title="Regenerate">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
            ` : '';

            messageDiv.innerHTML = `
                <div class="message-content" data-content="${escapeAttr(content)}">${contentHtml}</div>
                ${actionsHtml}
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatContent(text) {
            // Bold text between **
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Convert newlines to <br>
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function escapeAttr(text) {
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function copyText(btn) {
            const content = btn.closest('.message').querySelector('.message-content').dataset.content;
            navigator.clipboard.writeText(content);
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message && !attachedImage) return;
            if (isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;

            addMessage('user', message || 'Analyze this image', attachedImage);

            const currentImage = attachedImage;
            const currentMessage = message || 'What do you see in this image?';

            messageInput.value = '';
            messageInput.style.height = 'auto';
            removeImage();

            addTypingIndicator();

            try {
                let response;

                if (currentImage) {
                    response = await fetch('/api/analyze-image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: currentImage,
                            prompt: currentMessage
                        })
                    });
                } else {
                    conversationHistory.push({ role: 'user', content: currentMessage });

                    response = await fetch('/api/message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: conversationHistory })
                    });
                }

                const data = await response.json();
                removeTypingIndicator();

                if (data.success && data.content) {
                    addMessage('assistant', data.content);
                    if (!currentImage) {
                        conversationHistory.push({ role: 'assistant', content: data.content });
                    }
                } else {
                    throw new Error(data.message || data.error || 'Failed to get response');
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Sorry, something went wrong: ${error.message}`);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        messageInput.focus();
    </script>
</body>
</html>
