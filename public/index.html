<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #212121;
            --bg-secondary: #2f2f2f;
            --bg-tertiary: #373737;
            --bg-hover: #404040;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --text-muted: #8e8e8e;
            --accent: #0084ff;
            --border: #444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Model Selector */
        .model-selector {
            position: relative;
        }

        .model-selector-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .model-selector-btn:hover {
            background: var(--bg-secondary);
        }

        .model-version {
            color: var(--text-muted);
            font-weight: 400;
        }

        .model-chevron {
            color: var(--text-muted);
            font-size: 12px;
            margin-left: 2px;
        }

        /* Dropdown */
        .model-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            min-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        .model-selector.open .model-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-section {
            margin-bottom: 8px;
        }

        .dropdown-section:last-child {
            margin-bottom: 0;
        }

        .dropdown-section-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 8px 12px 6px;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0;
        }

        .model-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .model-option:hover {
            background: var(--bg-hover);
        }

        .model-option-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .model-option-name {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .model-option-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .model-option-check {
            color: var(--text-primary);
            font-size: 1.1rem;
            opacity: 0;
        }

        .model-option.selected .model-option-check {
            opacity: 1;
        }

        .model-option-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .submenu-trigger {
            position: relative;
        }

        /* Header Right */
        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .header-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .header-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 768px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message-content {
            max-width: 85%;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 18px;
        }

        .message.assistant .message-content {
            color: var(--text-primary);
        }

        .message.assistant .message-content strong {
            font-weight: 600;
        }

        .message-content img {
            max-width: 280px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: block;
        }

        .message.user .message-content img {
            max-width: 180px;
            margin-bottom: 0;
            margin-top: 8px;
        }

        /* Message Actions */
        .message-actions {
            display: flex;
            gap: 2px;
            margin-top: 4px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .action-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .action-btn.active {
            color: var(--text-primary);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
        }

        .action-btn.copied {
            color: #22c55e;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        /* Input Area */
        .input-wrapper {
            padding: 16px 0 24px;
        }

        .input-area {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color 0.15s;
        }

        .input-area:focus-within {
            border-color: #666;
        }

        .attach-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: -4px;
            border-radius: 50%;
            transition: all 0.15s;
        }

        .attach-btn:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .attach-btn svg {
            width: 20px;
            height: 20px;
        }

        .input-field {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            padding: 10px 0;
            resize: none;
            min-height: 22px;
            max-height: 150px;
        }

        .input-field:focus {
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--text-primary);
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Image Preview */
        .image-preview {
            display: none;
            margin-bottom: 8px;
            position: relative;
            width: fit-content;
        }

        .image-preview.active {
            display: block;
        }

        .image-preview img {
            height: 80px;
            border-radius: 12px;
        }

        .remove-image {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .remove-image:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* Hidden */
        #imageInput {
            display: none;
        }

        /* Welcome State */
        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .welcome-content {
            text-align: center;
        }

        .welcome h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 200;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Share Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            z-index: 300;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .share-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .share-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: background 0.15s;
        }

        .share-option:hover {
            background: var(--bg-hover);
        }

        .share-option svg {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="model-selector" id="modelSelector">
            <button class="model-selector-btn" onclick="toggleModelDropdown()">
                <span id="selectedModelName">Loading...</span>
                <span class="model-chevron">▾</span>
            </button>
            <div class="model-dropdown" id="modelDropdown">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="header-right">
            <button class="header-btn" onclick="showShareModal()" title="Share">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
            </button>
            <button class="header-btn" onclick="clearChat()" title="New chat">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>
    </header>

    <main class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-content">
                    <h2>What can I help with?</h2>
                    <p>Select a model and start chatting</p>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="Preview">
                <button class="remove-image" onclick="removeImage()">×</button>
            </div>
            <div class="input-area">
                <button class="attach-btn" onclick="document.getElementById('imageInput').click()" title="Attach image">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
                <textarea 
                    class="input-field"
                    id="messageInput" 
                    placeholder="Ask anything"
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                    </svg>
                </button>
            </div>
        </div>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal" onclick="hideShareModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>Share conversation</h3>
            <div class="share-options">
                <button class="share-option" onclick="copyLink()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                    </svg>
                    Copy link
                </button>
                <button class="share-option" onclick="shareTwitter()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Share on X
                </button>
            </div>
        </div>
    </div>

    <script>
        // State
        let attachedImage = null;
        let isLoading = false;
        let conversationHistory = [];
        let providers = [];
        let selectedProvider = null;
        let selectedModel = null;

        // DOM Elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const modelSelector = document.getElementById('modelSelector');
        const modelDropdown = document.getElementById('modelDropdown');
        const selectedModelName = document.getElementById('selectedModelName');
        const toast = document.getElementById('toast');
        const shareModal = document.getElementById('shareModal');

        // Fetch providers from API on load
        async function fetchProviders() {
            try {
                const response = await fetch('/api/models');
                const data = await response.json();
                if (data.success && data.providers) {
                    providers = data.providers;
                    renderProviderDropdown();
                    // Auto-select first model of first provider
                    if (providers.length > 0) {
                        const firstProvider = providers[0];
                        const firstModel = firstProvider.models[0];
                        if (firstModel) {
                            selectModel(firstProvider.id, firstModel.id, firstModel.displayName);
                        }
                    }
                }
            } catch (error) {
                console.error('Failed to fetch providers:', error);
                selectedModelName.textContent = 'Error loading';
            }
        }

        function renderProviderDropdown() {
            let html = '';
            providers.forEach((provider, index) => {
                if (index > 0) {
                    html += '<div class="dropdown-divider"></div>';
                }
                html += `
                    <div class="dropdown-section">
                        <div class="dropdown-section-title">${provider.name}</div>
                        ${provider.models.map(model => `
                            <div class="model-option ${selectedModel === model.id ? 'selected' : ''}" 
                                 data-provider="${provider.id}" 
                                 data-model="${model.id}"
                                 onclick="selectModel('${provider.id}', '${model.id}', '${model.displayName}')">
                                <div class="model-option-left">
                                    <div class="model-option-name">${model.displayName}</div>
                                </div>
                                <span class="model-option-check">✓</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            });
            modelDropdown.innerHTML = html;
        }

        // Toast
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Model Selector
        function toggleModelDropdown() {
            modelSelector.classList.toggle('open');
        }

        function selectModel(providerId, modelId, displayName) {
            selectedProvider = providerId;
            selectedModel = modelId;
            selectedModelName.textContent = displayName;
            
            // Update selected state visually
            document.querySelectorAll('.model-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.model === modelId);
            });
            
            modelSelector.classList.remove('open');
            clearChat();
            showToast(`Switched to ${displayName}`);
        }

        // Initialize
        fetchProviders();

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!modelSelector.contains(e.target)) {
                modelSelector.classList.remove('open');
            }
        });

        // Share Modal
        function showShareModal() {
            shareModal.classList.add('show');
        }

        function hideShareModal(e) {
            if (e.target === shareModal) {
                shareModal.classList.remove('show');
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            shareModal.classList.remove('show');
            showToast('Link copied to clipboard');
        }

        function shareTwitter() {
            const text = 'Check out this AI conversation!';
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`, '_blank');
            shareModal.classList.remove('show');
        }

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Handle Enter key
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedImage = e.target.result.split(',')[1];
                previewImg.src = e.target.result;
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            attachedImage = null;
            imagePreview.classList.remove('active');
            document.getElementById('imageInput').value = '';
        }

        function clearChat() {
            conversationHistory = [];
            messagesContainer.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-content">
                        <h2>What can I help with?</h2>
                        <p>Select a model and start chatting</p>
                    </div>
                </div>
            `;
        }

        function addMessage(role, content, imageData = null) {
            const welcomeEl = document.getElementById('welcome');
            if (welcomeEl) welcomeEl.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let contentHtml = '';
            if (role === 'user' && imageData) {
                contentHtml = `<img src="data:image/jpeg;base64,${imageData}" alt="Image">`;
            }
            contentHtml += formatContent(content);

            const actionsHtml = role === 'assistant' ? `
                <div class="message-actions">
                    <button class="action-btn" onclick="copyMessage(this)" title="Copy">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                    <button class="action-btn" onclick="likeMessage(this)" title="Good response">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5" />
                        </svg>
                    </button>
                    <button class="action-btn" onclick="dislikeMessage(this)" title="Bad response">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5" />
                        </svg>
                    </button>
                </div>
            ` : '';

            messageDiv.innerHTML = `
                <div class="message-content" data-content="${escapeAttr(content)}">${contentHtml}</div>
                ${actionsHtml}
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatContent(text) {
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function escapeAttr(text) {
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function copyMessage(btn) {
            const content = btn.closest('.message').querySelector('.message-content').dataset.content;
            navigator.clipboard.writeText(content);
            btn.classList.add('copied');
            showToast('Copied to clipboard');
            setTimeout(() => btn.classList.remove('copied'), 2000);
        }

        function likeMessage(btn) {
            const actions = btn.closest('.message-actions');
            actions.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showToast('Thanks for your feedback!');
        }

        function dislikeMessage(btn) {
            const actions = btn.closest('.message-actions');
            actions.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showToast('Thanks for your feedback!');
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message && !attachedImage) return;
            if (isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;

            addMessage('user', message || 'Analyze this image', attachedImage);

            const currentImage = attachedImage;
            const currentMessage = message || 'What do you see in this image?';
            const currentProvider = selectedProvider;
            const currentModel = selectedModel;

            messageInput.value = '';
            messageInput.style.height = 'auto';
            removeImage();

            addTypingIndicator();

            try {
                let response;

                if (currentImage) {
                    response = await fetch('/api/analyze-image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: currentImage,
                            prompt: currentMessage,
                            provider: currentProvider
                        })
                    });
                } else {
                    conversationHistory.push({ role: 'user', content: currentMessage });

                    response = await fetch('/api/message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            messages: conversationHistory,
                            provider: currentProvider
                        })
                    });
                }

                const data = await response.json();
                removeTypingIndicator();

                if (data.success && data.content) {
                    addMessage('assistant', data.content);
                    if (!currentImage) {
                        conversationHistory.push({ role: 'assistant', content: data.content });
                    }
                } else {
                    throw new Error(data.message || data.error || 'Failed to get response');
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Sorry, something went wrong: ${error.message}`);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        messageInput.focus();
    </script>
</body>
</html>
